<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <!-- CSS LINK -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Header -->
        <div class="header">
            <h1>Weather App</h1>
            <input type="text" placeholder="Search city..." class="search-box">
        </div>

        <!-- Weather Card -->
        <div class="weather-card">
            <h2 class="city">Vijayawada</h2>
            <h1 class="temp">--°C</h1>
            <p class="condition">--</p>

            <div class="details">
                <div class="box">
                    <p>Humidity</p>
                    <h3>--%</h3>
                </div>

                <div class="box">
                    <p>Wind</p>
                    <h3>-- km/h</h3>
                </div>

                <div class="box">
                    <p>Pressure</p>
                    <h3>-- hPa</h3>
                </div>
            </div>
        </div>

    </div>

    <!-- JS LINK -->
    <script src="script.js"></script>

</body>
</html>
